<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmação de Presença — Taiane &amp; Ivan</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <span class="coracao">♡</span>
    <h1>Taiane &amp; Ivan</h1>
    <p>15 de Maio de 2027</p>
    <p>Confirme sua presença até <strong>30 de Julho de 2026</strong>.</p>
  </header>

  <main>
    <form id="form-confirmacao">

      <!-- BLOCO 1: Dados do convidado -->
      <section>
        <h2>Seus dados</h2>

        <label for="nome">Nome completo *</label>
        <input type="text" id="nome" name="nome" placeholder="Ex: Maria Oliveira" required>

        <label for="telefone">Telefone / WhatsApp</label>
        <input type="tel" id="telefone" name="telefone" placeholder="(31) 9 0000-0000">
      </section>

      <!-- BLOCO 2: Acompanhante -->
      <section>
        <h2>Acompanhante</h2>

        <label>
          <input type="checkbox" id="tem-acompanhante">
          Vou com acompanhante
        </label>

        <div id="campo-acompanhante">
          <label for="nome-acompanhante">Nome do acompanhante</label>
          <input type="text" id="nome-acompanhante" name="acompanhante" placeholder="Ex: João Oliveira">
        </div>
      </section>

      <!-- BLOCO 3: Filhos -->
      <section>
        <h2>Filhos</h2>

        <label>
          <input type="checkbox" id="tem-filhos">
          Levarei filhos
        </label>

        <div id="campo-filhos">
          <label for="nome-filhos">Nome(s) do(s) filho(s)</label>
          <input type="text" id="nome-filhos" name="filhos" placeholder="Ex: Ana, Pedro">
        </div>
      </section>

      <button type="submit">Confirmar minha presença</button>

    </form>
  </main>

  <footer>
    <p>Taiane &amp; Ivan · Maio 2027</p>
  </footer>

  <!-- JavaScript sempre no final do body -->
  <script>
    // 1. Encontra os elementos pelo id
    const checkAcompanhante = document.getElementById('tem-acompanhante')
    const campoAcompanhante = document.getElementById('campo-acompanhante')

    const checkFilhos       = document.getElementById('tem-filhos')
    const campoFilhos       = document.getElementById('campo-filhos')

    const form              = document.getElementById('form-confirmacao')
    const inputNome         = document.getElementById('nome')

    // 2. Esconde os campos condicionais quando a página carrega
    campoAcompanhante.style.display = 'none'
    campoFilhos.style.display       = 'none'

    // 3. Mostra/esconde campo de acompanhante conforme o checkbox
    checkAcompanhante.addEventListener('change', function() {
      if (checkAcompanhante.checked) {
        campoAcompanhante.style.display = 'block'
      } else {
        campoAcompanhante.style.display = 'none'
      }
    })

    // 4. Mostra/esconde campo de filhos conforme o checkbox
    checkFilhos.addEventListener('change', function() {
      if (checkFilhos.checked) {
        campoFilhos.style.display = 'block'
      } else {
        campoFilhos.style.display = 'none'
      }
    })

    // 5. Envio do formulário
    form.addEventListener('submit', function(event) {
      event.preventDefault()

      // Validação do campo obrigatório
      if (inputNome.value.trim() === '') {
        alert('Por favor, informe seu nome completo.')
        return
      }

      // Captura os valores — se checkbox desmarcado, envia 'Não'
      const nome         = inputNome.value.trim()
      const telefone     = document.getElementById('telefone').value.trim()
      const acompanhante = checkAcompanhante.checked
        ? document.getElementById('nome-acompanhante').value.trim()
        : 'Não'
      const filhos       = checkFilhos.checked
        ? document.getElementById('nome-filhos').value.trim()
        : 'Não'


      const url = 'https://docs.google.com/forms/d/e/1FAIpQLSfu6C2jQLjlbSt5F33S6hbauzO_hbqjBPqCs-y1Iua2f9RBJA/formResponse'
        + '?entry.981768616='  + encodeURIComponent(nome)
        + '&entry.411202514='  + encodeURIComponent(telefone)
        + '&entry.1274919399=' + encodeURIComponent(acompanhante)
        + '&entry.774592381='  + encodeURIComponent(filhos)

      // Envia em segundo plano sem redirecionar o usuário
      fetch(url, { method: 'POST', mode: 'no-cors' })

      // Substitui o formulário pela mensagem de sucesso
      form.innerHTML = `
        <div class="sucesso">
          <p class="sucesso-coracao">♡</p>
          <h2>Presença confirmada!</h2>
          <p>Estamos ansiosos para celebrar com você.</p>
        </div>
      `
    })
  </script>

</body>
</html>
